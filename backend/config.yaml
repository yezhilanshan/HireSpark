# AI 模拟面试与能力提升平台 - 配置文件
# 配置文件版本: 2.0
# 最后更新: 2026-03-21
# 改造进行中 - 从防作弊系统改向AI面试系统

# ====================================
# 系统基本配置
# ====================================
system:
  name: "AI 模拟面试与能力提升平台"
  version: "2.0.0"
  environment: "development"  # development, production, test
  debug: true
  timezone: "Asia/Shanghai"

# ====================================
# 服务器配置
# ====================================
server:
  host: "0.0.0.0"
  port: 5000
  secret_key: "CHANGE-THIS-TO-RANDOM-STRING-IN-PRODUCTION"  # 生产环境请更改为随机字符串
  cors_origins:
    - "http://localhost:3000"
    - "http://127.0.0.1:3000"
    - "http://localhost:5000"
    - "http://127.0.0.1:5000"
  max_connections: 100
  timeout: 30  # 秒
  max_buffer_size: 10485760  # 10MB

# ====================================
# 数据库配置
# ====================================
database:
  type: "sqlite"
  path: "interview_system.db"
  backup_enabled: true # 是否启用数据库备份
  backup_interval: 86400  # 24小时（秒）
  backup_dir: "backups" # 备份文件存储目录
  max_backups: 7  # 保留最近7个备份

# ====================================
# 性能配置
# ====================================
performance:
  enable_monitoring: true  # 启用性能监控
  monitoring_interval: 10  # 监控输出间隔（秒）
  
  # 视频处理
  video:
    max_width: 640
    max_height: 480
    jpeg_quality: 85

# ====================================
# 日志配置
# ====================================
logging:
  enabled: true
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  console_output: true  # 是否输出到控制台
  
  # 文件日志
  file:
    enabled: true
    path: "logs/system.log"
    max_size: 10485760  # 10MB（字节）
    backup_count: 5  # 保留的日志文件数
    encoding: "utf-8"
  
  # 日志格式
  format:
    standard: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    detailed: "%(asctime)s - %(name)s - [%(filename)s:%(lineno)d] - %(levelname)s - %(message)s"
    simple: "%(levelname)s: %(message)s"
  
  # 按模块设置日志级别
  modules:
    utils: "INFO"
    database: "INFO"
    interview: "INFO"
    llm: "INFO"

# ====================================
# 报告生成配置
# ====================================
report:
  output_dir: "reports"
  auto_save: true
  include_screenshots: false
  screenshot_interval: 30  # 秒
  
  # PDF设置
  pdf:
    page_size: "A4"
    margin: 20  # 毫米
    font_size: 12
    include_charts: true
  
  # 报告内容
  content:
    include_assessment: true  # 包含综合评价
    include_suggestions: true  # 包含建议
    include_statistics: true  # 包含统计图表

# ====================================
# 安全配置
# ====================================
security:
  enabled: true
  jwt_secret: "change-this-secret-key"
  jwt_expiration: 3600  # 秒

# ====================================
# LLM 配置
# ====================================
llm:
  enabled: true  # 已启用
  provider: "qwen"  # qwen
  model: "qwen-max"  # 阿里通义 Qwen 模型（文本）
  vision_model: "qwen-vl-max"  # 阿里通义视觉模型（用于简历识别等）
  tts_model: "cosyvoice-v3-flash"  # 阿里通义语音模型（TTS）
  api_key: "${BAILIAN_API_KEY}"  # 从环境变量读取
  api_base_url: ""
  timeout: 30  # 秒
  
  # 面试官配置
  interviewer:
    initial_message: "你好，我是你的面试官。让我们开始今天的技术面试。"
    difficulty_levels: ["easy", "medium", "hard"]
    initial_difficulty: "medium"
    max_questions_per_round: 3

# ====================================
# 全局 AI 助理配置（非面试链路）
# ====================================
assistant:
  enabled: true
  provider: "qwen"
  model: "qwen-plus"
  timeout: 60
  max_history: 6
  max_context_chars: 1200
  default_max_tokens: 512
  default_temperature: 0.25
  force_plain_text: true
  default_system_prompt: "你是一个专业、简洁、可信的中文求职助手。重点帮助用户准备技术面试、梳理项目表达、优化简历表述，并提供可执行建议。回答请直奔主题，先给结论，再给关键理由。"
  qwen:
    api_key: "${BAILIAN_API_KEY}"
    fallback_text_model: "qwen-plus"
  openrouter:
    base_url: "https://openrouter.ai/api/v1"
    api_key: ""
    site_url: ""
    app_name: "tianshuzhimian"
  ollama:
    base_url: "http://127.0.0.1:11434"
    think: false
    num_ctx: 1536
    keep_alive: "2m"

# ====================================
# TTS 配置
# ====================================
tts:
  enabled: true
  mode: "remote"
  service_url: "http://127.0.0.1:5001"
  timeout: 60

# ====================================
# RAG 配置
# ====================================
rag:
  enabled: true
  store: "chroma"
  vector_db: "chroma"  # 兼容旧字段
  embedding_model: "shibing624/text2vec-base-chinese"
  knowledge_path: "interview_knowledge"
  additional_knowledge_paths:
    - "basic_knowledge"
  persist_dir: "rag_data"
  collection_name: "interview_questions"
  search_type: "similarity"
  top_k: 5
  min_similarity: 0.45
  max_context_results: 3
  max_similarity_gap: 0.15
  min_lexical_score: 0.08
  question_candidate_pool_size: 12
  question_selection_pool_size: 5
  question_randomness: 0.35
  auto_build_on_start: false

# ====================================
# 三层评估配置
# ====================================
evaluation:
  version: "v1"
  prompt_version: "v1"
  semantic_threshold: 0.74
  max_workers: 2
  retry:
    layer1: 1
    layer2: 2
    persist: 2
    backoff_seconds: 0.2

# ====================================
# 面试复盘配置（A/B/C/D/E）
# ====================================
replay:
  version: "v2_qwen_fallback"
  max_workers: 2
  llm:
    enabled: true
    model: "qwen-plus"
    timeout: 45
    max_turns: 14
  behavior:
    enabled: true
    auto_trigger: true
    max_workers: 1
    version: "v2_behavior_heuristic"
    min_gaze_offscreen_ratio: 20
    long_latency_ms: 3500
    filler_per_100_words_threshold: 6
    long_pause_count_threshold: 2

# ====================================
# 视频上传与回放配置
# ====================================
video_upload:
  tmp_dir: "backend/uploads/video_uploads"
  final_dir: "backend/uploads/interview_videos"
  chunk_size_hint: 2097152
  upload_expires_seconds: 3600
  enable_transcode: true
  keep_raw: true
  transcode_preset: "veryfast"
  transcode_crf: 23
  transcode_target_fps: 30
  transcode_gop_seconds: 1.0
  transcode_audio_bitrate: "128k"
  transcode_timeout_seconds: 7200
  playback_signing_secret: "CHANGE-THIS-VIDEO-SIGNING-SECRET"

# ====================================
# 岗位配置（后续扩展）
# ====================================
positions:
  - id: "java_backend"
    name: "Java后端工程师"
    description: "后端服务开发工程师"
    enabled: false  # 将在改造中启用
  
  - id: "frontend_engineer"
    name: "前端工程师"
    description: "前端应用开发工程师"
    enabled: false  # 将在改造中启用

  - id: "product_manager"
    name: "产品经理"
    description: "产品规划与需求分析"
    enabled: false  # 将在改造中启用

# ====================================
# 开发和调试
# ====================================
development:
  mock_data: false
  test_mode: false
  verbose_errors: true
